name: Deploy

# Triggered programmatically by DeployAgent._trigger_workflow()
# via PyGithub: wf.create_dispatch(ref=branch, inputs={...})
#
# Also supports manual dispatch for hotfixes and rollbacks.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "Docker image tag / git ref to deploy"
        required: true
        type: string
      action:
        description: "Deploy or rollback"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - rollback
      feature_id:
        description: "Pipeline feature UUID (set by DeployAgent)"
        required: false
        type: string
      pr_number:
        description: "GitHub PR number (informational)"
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false   # Never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Validate inputs
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    outputs:
      is_rollback: ${{ steps.check.outputs.is_rollback }}
      deploy_tag: ${{ steps.check.outputs.deploy_tag }}
    steps:
      - name: Check inputs
        id: check
        run: |
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Env:    ${{ github.event.inputs.environment }}"
          echo "Tag:    ${{ github.event.inputs.version }}"

          if [[ "${{ github.event.inputs.action }}" == "rollback" ]]; then
            echo "is_rollback=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_rollback=false" >> "$GITHUB_OUTPUT"
          fi

          # Sanitize version tag
          TAG=$(echo "${{ github.event.inputs.version }}" | tr -cd '[:alnum:]-_.')
          echo "deploy_tag=${TAG}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # 2. Build & push Docker image (skipped on rollback)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.is_rollback == 'false'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.deploy_tag }}
            type=sha,prefix=sha-

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./ai-sdlc
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # 3. Deploy to staging
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: >
      always() &&
      github.event.inputs.environment == 'staging' &&
      (needs.build.result == 'success' || needs.validate.outputs.is_rollback == 'true')
    environment:
      name: staging
      url: https://staging.ai-sdlc.internal
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
          IMAGE_TAG: ${{ needs.validate.outputs.deploy_tag }}
          ACTION: ${{ github.event.inputs.action }}
        run: |
          echo "Deploying version=${IMAGE_TAG} to staging (action=${ACTION})"
          # ── Replace this block with your actual deploy command ──────────────
          # Examples:
          #   kubectl set image deploy/ai-sdlc app=$REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          #   helm upgrade --install ai-sdlc ./chart --set image.tag=$IMAGE_TAG
          # ────────────────────────────────────────────────────────────────────
          echo "STUB: kubectl set image deployment/ai-sdlc app=${IMAGE_TAG}"

      - name: Smoke test (staging)
        run: |
          echo "STUB: curl -f https://staging.ai-sdlc.internal/healthz"

      - name: Report success
        run: |
          echo "::notice::Deployed ${{ needs.validate.outputs.deploy_tag }} to staging"

  # ──────────────────────────────────────────────────────────────
  # 4. Deploy to production (with canary gate)
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: >
      always() &&
      github.event.inputs.environment == 'production' &&
      (needs.build.result == 'success' || needs.validate.outputs.is_rollback == 'true')
    environment:
      name: production
      url: https://ai-sdlc.internal
    steps:
      - uses: actions/checkout@v4

      - name: Deploy canary (10% traffic)
        env:
          IMAGE_TAG: ${{ needs.validate.outputs.deploy_tag }}
        run: |
          echo "STUB: kubectl set image deploy/ai-sdlc-canary app=${IMAGE_TAG}"
          echo "STUB: kubectl scale deploy/ai-sdlc-canary --replicas=1"

      - name: Wait — canary window (5 min)
        # Real implementation: query Prometheus/Datadog for error rate delta
        # DeployAgent._canary_check() also runs this check in Python
        run: |
          echo "Canary observation window: 5 minutes"
          sleep 5   # CI shortcut — real runs use a longer window

      - name: Check canary health
        id: canary
        run: |
          # STUB: always pass in CI; replace with real metric query
          echo "canary_passed=true" >> "$GITHUB_OUTPUT"
          echo "error_rate_delta=0.001" >> "$GITHUB_OUTPUT"

      - name: Promote canary to full rollout
        if: steps.canary.outputs.canary_passed == 'true'
        env:
          IMAGE_TAG: ${{ needs.validate.outputs.deploy_tag }}
        run: |
          echo "Canary passed. Promoting to full rollout."
          echo "STUB: kubectl set image deploy/ai-sdlc app=${IMAGE_TAG}"
          echo "STUB: kubectl scale deploy/ai-sdlc-canary --replicas=0"

      - name: Rollback canary on failure
        if: steps.canary.outputs.canary_passed == 'false'
        run: |
          echo "::error::Canary failed (delta=${{ steps.canary.outputs.error_rate_delta }}). Rolling back."
          echo "STUB: kubectl rollout undo deployment/ai-sdlc"
          exit 1

      - name: Report success
        run: |
          echo "::notice::Deployed ${{ needs.validate.outputs.deploy_tag }} to production"

  # ──────────────────────────────────────────────────────────────
  # 5. Rollback path (bypasses build)
  # ──────────────────────────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.is_rollback == 'true'
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Execute rollback
        env:
          TARGET_VERSION: ${{ needs.validate.outputs.deploy_tag }}
          ENV: ${{ github.event.inputs.environment }}
        run: |
          echo "Rolling back $ENV to version $TARGET_VERSION"
          echo "STUB: kubectl set image deployment/ai-sdlc app=${TARGET_VERSION}"
          echo "STUB: kubectl rollout status deployment/ai-sdlc --timeout=120s"

      - name: Verify rollback
        run: |
          echo "STUB: curl -f https://${ENV}.ai-sdlc.internal/healthz"
          echo "::notice::Rollback of ${{ github.event.inputs.environment }} complete"

  # ──────────────────────────────────────────────────────────────
  # 6. Notify pipeline on completion (success or failure)
  # ──────────────────────────────────────────────────────────────
  notify:
    name: Notify pipeline
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, rollback]
    if: always()
    steps:
      - name: Post deployment status
        env:
          FEATURE_ID: ${{ github.event.inputs.feature_id }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          VERSION: ${{ github.event.inputs.version }}
          ACTION: ${{ github.event.inputs.action }}
          # One of: success / failure / cancelled
          DEPLOY_RESULT: >-
            ${{
              contains(needs.*.result, 'failure') && 'failure' ||
              contains(needs.*.result, 'cancelled') && 'cancelled' ||
              'success'
            }}
        run: |
          echo "Deployment ${ACTION} result: ${DEPLOY_RESULT}"
          echo "  feature_id=${FEATURE_ID}"
          echo "  environment=${ENVIRONMENT}"
          echo "  version=${VERSION}"
          echo "  run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # DeployAgent._poll_workflow() polls this run's conclusion via GitHub API
          # No outbound webhook needed — the Python agent polls until run completes
